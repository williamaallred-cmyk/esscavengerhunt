<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Scavenger Hunt</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the checkmark icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Prevent text selection on iPads to make it feel like a native app */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background-color: #f3f4f6;
        }
        
        /* Smooth transitions for interactions */
        .card-btn {
            transition: transform 0.1s ease-in-out, box-shadow 0.1s ease-in-out;
        }
        .card-btn:active {
            transform: scale(0.96);
        }

        /* Image object fit */
        .photo-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.75rem;
        }
        /* Allow typing in description field */
        textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        /* Active tab underline */
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #2563eb;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen pb-10 font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-6 shadow-md text-center rounded-b-3xl mb-6">
        <h1 class="text-3xl font-bold mb-2">Scavenger Hunt</h1>
        <p class="text-blue-100">Tap an item when you spot it!</p>
    </header>

    <!-- Main Grid Container -->
    <main class="max-w-5xl mx-auto px-4">
        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <!-- Cards will be injected here by JavaScript -->
        </div>

        <div class="mt-12 text-center">
            <button onclick="resetProgress()" class="text-gray-400 text-sm underline hover:text-red-500">
                Reset Progress (Start Over)
            </button>
        </div>
    </main>

    <!-- Hidden Camera Input -->
    <!-- 'capture="environment"' tells mobile devices to use the rear-facing camera -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">

    <!-- Main Interaction Modal -->
    <div id="main-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-50 flex items-center justify-center p-4" style="backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);">
        <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden">

            <!-- PANE 1: Confirm sighting -->
            <div id="modal-confirm" class="hidden">
                <div class="p-6 text-center">
                    <div id="confirm-visual" class="mb-3 flex justify-center items-center h-24"></div>
                    <p class="text-gray-400 text-sm mb-1">Did you find this?</p>
                    <h2 id="confirm-item-title" class="text-2xl font-bold mb-6 text-gray-800"></h2>
                    <div class="flex gap-3">
                        <button id="btn-no"  class="flex-1 py-3 px-4 bg-gray-100 text-gray-700 font-bold rounded-xl active:bg-gray-200">Not yet</button>
                        <button id="btn-yes" class="flex-1 py-3 px-4 bg-green-500 text-white font-bold rounded-xl active:bg-green-600 shadow-md">
                            <i class="fa-solid fa-check mr-1"></i> Found it!
                        </button>
                    </div>
                </div>
            </div>

            <!-- PANE 2: Photo choice -->
            <div id="modal-photo-choice" class="hidden">
                <div class="p-6 text-center">
                    <div class="text-5xl mb-3">🎉</div>
                    <h2 class="text-xl font-bold mb-1 text-gray-800">Nice find!</h2>
                    <p class="text-gray-400 text-sm mb-6">Want to take a photo of it?</p>
                    <div class="flex gap-3">
                        <button id="btn-skip-photo" class="flex-1 py-3 px-4 bg-gray-100 text-gray-700 font-bold rounded-xl active:bg-gray-200">Skip</button>
                        <button id="btn-take-photo" class="flex-1 py-3 px-4 bg-blue-500 text-white font-bold rounded-xl active:bg-blue-600 shadow-md">
                            <i class="fa-solid fa-camera mr-1"></i> Take Photo
                        </button>
                    </div>
                </div>
            </div>

            <!-- PANE 3: Notes (write or draw) for completed items -->
            <div id="modal-description" class="hidden">
                <div class="p-4 border-b flex items-center justify-between">
                    <h2 id="desc-item-title" class="text-lg font-bold text-gray-800"></h2>
                    <button id="btn-close-desc" class="text-gray-400 text-xl px-2 leading-none active:text-gray-700">✕</button>
                </div>
                <div id="desc-photo-wrap" class="hidden bg-gray-100 h-36 flex items-center justify-center">
                    <img id="desc-photo" class="max-h-full max-w-full object-contain" alt="Your photo">
                </div>
                <div class="flex border-b text-sm">
                    <button id="tab-write" class="flex-1 py-2 font-semibold">✏️ Write</button>
                    <button id="tab-draw"  class="flex-1 py-2 font-semibold">🖊️ Draw</button>
                </div>
                <div id="pane-write" class="p-4">
                    <textarea id="desc-textarea" rows="4"
                        class="w-full border border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-300"
                        placeholder="Describe what you saw…"></textarea>
                </div>
                <div id="pane-draw" class="hidden p-4">
                    <canvas id="draw-canvas" class="border border-gray-200 rounded-xl w-full block" style="touch-action:none;height:180px;"></canvas>
                    <button id="btn-clear-drawing" class="mt-2 text-xs text-red-400 underline">Clear drawing</button>
                </div>
                <div class="p-4 border-t flex gap-3">
                    <button id="btn-cancel-desc" class="flex-1 py-3 px-4 bg-gray-100 text-gray-700 font-bold rounded-xl active:bg-gray-200">Cancel</button>
                    <button id="btn-save-desc"   class="flex-1 py-3 px-4 bg-blue-500 text-white font-bold rounded-xl active:bg-blue-600 shadow-md">Save Notes</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Save Toast Notification -->
    <div id="save-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white px-5 py-3 rounded-full shadow-lg text-sm font-semibold opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        <i class="fa-solid fa-floppy-disk mr-2"></i> Saved!
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: Edit your worksheet items here
        // ==========================================
        const initialItems = [
            { id: 'item_1',  title: 'Ant',            icon: '🐜' },
            { id: 'item_2',  title: 'Pillbug',        icon: '🪲', iconUrl: 'pillbug.png' },
            { id: 'item_3',  title: 'Spider',         icon: '🕷️' },
            { id: 'item_4',  title: 'Lizard',         icon: '🦎' },
            { id: 'item_5',  title: 'Bird',           icon: '🐦' },
            { id: 'item_6',  title: 'Flower',         icon: '🌼' },
            { id: 'item_7',  title: 'Tree',           icon: '🌳' },
            { id: 'item_8',  title: 'Grass',          icon: '🌱', iconUrl: 'grass.png' },
            { id: 'item_9',  title: 'Butterfly',      icon: '🦋' },
            { id: 'item_10', title: 'Squirrel nest',  icon: '🍂', iconUrl: 'squirrel nest.png' },
            { id: 'item_11', title: 'Wasp nest',      icon: '🐝', iconUrl: 'wasp nest.png' },
            { id: 'item_12', title: 'Mud dauber nest',icon: '🤎', iconUrl: 'mud dauber nest.png' },
            { id: 'item_13', title: 'Squirrel',       icon: '🐿️' },
            { id: 'item_14', title: 'Pine cone',      icon: '🌲', iconUrl: 'pinecone.png' },
            { id: 'item_15', title: 'Larva (draw it!)',icon: '🐛' },
            { id: 'item_16', title: 'Earthworm',      icon: '🪱' },
            { id: 'item_17', title: 'Ant mound',      icon: '⛰️' },
            { id: 'item_18', title: 'Bird nest',      icon: '🪺' },
            { id: 'item_19', title: 'Leaf',           icon: '🍃' },
            { id: 'item_20', title: 'Cricket',        icon: '🦗', iconUrl: 'cricket.png' },
            { id: 'item_21', title: 'Grasshopper',    icon: '🦗', iconUrl: 'grasshopper.png' },
            { id: 'item_22', title: 'Water source',   icon: '💧' },
            { id: 'item_23', title: 'Scat',           icon: '💩' },
            { id: 'item_24', title: 'Beetle',         icon: '🐞', iconUrl: 'beetle.png' },
            { id: 'item_25', title: 'Antlion den',    icon: '🕳️', iconUrl: 'antlion den.png' }
        ];

        // ==========================================
        // APP STATE
        // ==========================================
        let itemsData = [];
        let activeItemId = null;

        // DOM Elements
        const gridContainer = document.getElementById('grid-container');
        const cameraInput   = document.getElementById('camera-input');
        const mainModal     = document.getElementById('main-modal');

        // ==========================================
        // STORAGE — IndexedDB with localStorage fallback
        // ==========================================
        const DB_NAME    = 'scavengerHuntDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'photos';
        let _db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                if (_db) { resolve(_db); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
                req.onerror   = (e) => reject(e.target.error);
            });
        }

        async function loadSavedData() {
            try {
                const database = await openDB();
                const tx = database.transaction(STORE_NAME, 'readonly');
                const records = await new Promise((resolve, reject) => {
                    const req = tx.objectStore(STORE_NAME).getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror   = (e) => reject(e.target.error);
                });
                if (records && records.length > 0) return records;
            } catch (e) { /* fall through */ }
            try {
                const saved = localStorage.getItem('scavengerHuntProgress');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed.map(item => ({
                        id:          item.id,
                        completed:   item.completed || !!item.photoBase64,
                        photoBase64: item.photoBase64 || null,
                        description: item.description || '',
                        drawing:     item.drawing     || null
                    }));
                }
            } catch (e) { /* ignore */ }
            return null;
        }

        async function saveProgress() {
            const records = itemsData.map(item => ({
                id:          item.id,
                completed:   item.completed,
                photoBase64: item.photoBase64,
                description: item.description,
                drawing:     item.drawing
            }));
            try {
                const database = await openDB();
                const tx = database.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                records.forEach(r => store.put(r));
                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror    = (e) => reject(e.target.error);
                });
                showSaveToast();
            } catch (e) {
                try {
                    localStorage.setItem('scavengerHuntProgress', JSON.stringify(itemsData));
                    showSaveToast();
                } catch (e2) {
                    alert('Warning: Could not save. Storage may be full or blocked.');
                }
            }
        }

        async function clearStorage() {
            try {
                const database = await openDB();
                const tx = database.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).clear();
                await new Promise((resolve) => { tx.oncomplete = resolve; });
            } catch (e) { /* ignore */ }
            try { localStorage.removeItem('scavengerHuntProgress'); } catch (e) { /* ignore */ }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        async function initApp() {
            itemsData = initializeFromConfig();
            const saved = await loadSavedData();
            if (saved && saved.length > 0) {
                const map = new Map(saved.map(s => [s.id, s]));
                itemsData = itemsData.map(item => {
                    const s = map.get(item.id);
                    if (!s) return item;
                    return {
                        ...item,
                        completed:   s.completed   || false,
                        photoBase64: s.photoBase64 || null,
                        description: s.description || '',
                        drawing:     s.drawing     || null
                    };
                });
            }
            renderGrid();
        }

        function initializeFromConfig() {
            return initialItems.map(item => ({
                ...item,
                completed:   false,
                photoBase64: null,
                description: '',
                drawing:     null
            }));
        }

        async function resetProgress() {
            if (confirm("Are you sure you want to delete all progress and start over?")) {
                await clearStorage();
                itemsData = initializeFromConfig();
                renderGrid();
            }
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function renderGrid() {
            gridContainer.innerHTML = '';
            itemsData.forEach(item => {
                const card = document.createElement('button');
                card.className = 'card-btn relative bg-white rounded-xl p-3 shadow-sm border-2 border-transparent flex flex-col items-center justify-center gap-3 aspect-square text-center focus:outline-none w-full';

                if (item.completed) {
                    card.classList.add('border-green-400', 'bg-green-50');
                    card.onclick = () => openDescriptionModal(item.id);
                } else {
                    card.onclick = () => openConfirmModal(item.id);
                }

                let visualHtml = '';
                if (item.photoBase64) {
                    card.classList.replace('p-3', 'p-1');
                    visualHtml = `<img src="${item.photoBase64}" class="photo-thumbnail" alt="Your photo of ${item.title}">`;
                } else if (item.iconUrl) {
                    visualHtml = `<img src="${item.iconUrl}" class="w-16 h-16 object-contain" alt="${item.title}">`;
                } else {
                    visualHtml = `<span class="text-5xl block drop-shadow-sm">${item.icon}</span>`;
                }

                const checkBadge = item.completed ? `
                    <div class="absolute -top-3 -right-3 bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md border-2 border-white z-10">
                        <i class="fa-solid fa-check text-xs"></i>
                    </div>` : '';

                const notesBadge = (item.completed && (item.description || item.drawing)) ? `
                    <div class="absolute -top-3 -left-3 bg-blue-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md border-2 border-white z-10">
                        <i class="fa-solid fa-pen text-xs"></i>
                    </div>` : '';

                card.innerHTML = `
                    ${checkBadge}
                    ${notesBadge}
                    <div class="flex-1 w-full flex items-center justify-center relative rounded-lg bg-gray-50 overflow-hidden">
                        ${visualHtml}
                    </div>
                    <div class="font-bold text-sm leading-tight px-1 h-10 flex items-center justify-center text-gray-700">
                        ${item.title}
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // ==========================================
        // MODAL: CONFIRM SIGHTING
        // ==========================================
        function openConfirmModal(itemId) {
            activeItemId = itemId;
            const item   = itemsData.find(i => i.id === itemId);
            const visual = document.getElementById('confirm-visual');
            visual.innerHTML = item.iconUrl
                ? `<img src="${item.iconUrl}" class="w-20 h-20 object-contain mx-auto" alt="${item.title}">`
                : `<span class="text-6xl">${item.icon}</span>`;
            document.getElementById('confirm-item-title').textContent = item.title;
            showModalStep('confirm');
            mainModal.classList.remove('hidden');
        }

        document.getElementById('btn-no').addEventListener('click', closeModal);
        document.getElementById('btn-yes').addEventListener('click', () => showModalStep('photo-choice'));

        // ==========================================
        // MODAL: PHOTO CHOICE
        // ==========================================
        document.getElementById('btn-skip-photo').addEventListener('click', () => {
            markCompleted(activeItemId, null);
            closeModal();
        });

        document.getElementById('btn-take-photo').addEventListener('click', () => {
            closeModal();
            cameraInput.value = '';
            cameraInput.click();
        });

        // ==========================================
        // CAMERA
        // ==========================================
        cameraInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.body.style.cursor = 'wait';
            const reader = new FileReader();
            reader.onload = function(event) {
                compressImage(event.target.result, function(compressed) {
                    markCompleted(activeItemId, compressed);
                    document.body.style.cursor = 'default';
                });
            };
            reader.readAsDataURL(file);
        });

        function markCompleted(itemId, photoBase64) {
            const idx = itemsData.findIndex(i => i.id === itemId);
            if (idx > -1) {
                itemsData[idx].completed = true;
                if (photoBase64) itemsData[idx].photoBase64 = photoBase64;
                saveProgress();
                renderGrid();
            }
        }

        // ==========================================
        // MODAL: DESCRIPTION / NOTES
        // ==========================================
        let _drawCtx   = null;
        let _isDrawing = false;
        let _lastX = 0, _lastY = 0;

        function openDescriptionModal(itemId) {
            activeItemId = itemId;
            const item   = itemsData.find(i => i.id === itemId);
            document.getElementById('desc-item-title').textContent = item.title;

            const photoWrap = document.getElementById('desc-photo-wrap');
            if (item.photoBase64) {
                document.getElementById('desc-photo').src = item.photoBase64;
                photoWrap.classList.remove('hidden');
            } else {
                photoWrap.classList.add('hidden');
            }

            document.getElementById('desc-textarea').value = item.description || '';
            showModalStep('description');
            mainModal.classList.remove('hidden');

            if (item.drawing) {
                // restore saved drawing — switch to draw tab after layout settles
                setTimeout(() => {
                    switchDescTab('draw');
                    const canvas = document.getElementById('draw-canvas');
                    initDrawCanvas(canvas);
                    const img = new Image();
                    img.onload = () => _drawCtx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
                    img.src = item.drawing;
                }, 80);
            } else {
                switchDescTab('write');
            }
        }

        function initDrawCanvas(canvas) {
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = canvas.offsetWidth  * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            _drawCtx = canvas.getContext('2d');
            _drawCtx.scale(dpr, dpr);
            _drawCtx.strokeStyle = '#1d4ed8';
            _drawCtx.lineWidth   = 3;
            _drawCtx.lineCap     = 'round';
            _drawCtx.lineJoin    = 'round';
        }

        function switchDescTab(tab) {
            const writePane = document.getElementById('pane-write');
            const drawPane  = document.getElementById('pane-draw');
            const tabWrite  = document.getElementById('tab-write');
            const tabDraw   = document.getElementById('tab-draw');
            if (tab === 'write') {
                writePane.classList.remove('hidden');
                drawPane.classList.add('hidden');
                tabWrite.classList.add('tab-active');
                tabDraw.classList.remove('tab-active');
            } else {
                writePane.classList.add('hidden');
                drawPane.classList.remove('hidden');
                tabDraw.classList.add('tab-active');
                tabWrite.classList.remove('tab-active');
                const canvas = document.getElementById('draw-canvas');
                if (!_drawCtx || canvas.width === 0) initDrawCanvas(canvas);
            }
        }

        document.getElementById('tab-write').addEventListener('click', () => switchDescTab('write'));
        document.getElementById('tab-draw').addEventListener('click',  () => switchDescTab('draw'));

        // Drawing — touch and mouse events
        const _drawCanvas = document.getElementById('draw-canvas');

        function canvasPos(e) {
            const r   = _drawCanvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return { x: src.clientX - r.left, y: src.clientY - r.top };
        }

        _drawCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            _isDrawing = true;
            const p = canvasPos(e); _lastX = p.x; _lastY = p.y;
        }, { passive: false });

        _drawCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!_isDrawing || !_drawCtx) return;
            const p = canvasPos(e);
            _drawCtx.beginPath(); _drawCtx.moveTo(_lastX, _lastY);
            _drawCtx.lineTo(p.x, p.y); _drawCtx.stroke();
            _lastX = p.x; _lastY = p.y;
        }, { passive: false });

        _drawCanvas.addEventListener('touchend', () => { _isDrawing = false; });

        _drawCanvas.addEventListener('mousedown', (e) => {
            _isDrawing = true; const p = canvasPos(e); _lastX = p.x; _lastY = p.y;
        });
        _drawCanvas.addEventListener('mousemove', (e) => {
            if (!_isDrawing || !_drawCtx) return;
            const p = canvasPos(e);
            _drawCtx.beginPath(); _drawCtx.moveTo(_lastX, _lastY);
            _drawCtx.lineTo(p.x, p.y); _drawCtx.stroke();
            _lastX = p.x; _lastY = p.y;
        });
        _drawCanvas.addEventListener('mouseup', () => { _isDrawing = false; });

        document.getElementById('btn-clear-drawing').addEventListener('click', () => {
            if (_drawCtx) {
                const c = document.getElementById('draw-canvas');
                _drawCtx.clearRect(0, 0, c.offsetWidth, c.offsetHeight);
            }
        });

        document.getElementById('btn-close-desc').addEventListener('click',  closeModal);
        document.getElementById('btn-cancel-desc').addEventListener('click', closeModal);

        document.getElementById('btn-save-desc').addEventListener('click', () => {
            const idx = itemsData.findIndex(i => i.id === activeItemId);
            if (idx > -1) {
                itemsData[idx].description = document.getElementById('desc-textarea').value.trim();
                const canvas  = document.getElementById('draw-canvas');
                const imgData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
                itemsData[idx].drawing = imgData.some(v => v !== 0) ? canvas.toDataURL('image/png') : null;
                saveProgress();
                renderGrid();
            }
            closeModal();
        });

        // ==========================================
        // MODAL HELPERS
        // ==========================================
        function showModalStep(step) {
            ['confirm', 'photo-choice', 'description'].forEach(s =>
                document.getElementById('modal-' + s).classList.add('hidden')
            );
            document.getElementById('modal-' + step).classList.remove('hidden');
        }

        function closeModal() {
            mainModal.classList.add('hidden');
            _isDrawing = false;
            _drawCtx   = null;
        }

        mainModal.addEventListener('click', (e) => { if (e.target === mainModal) closeModal(); });

        // ==========================================
        // IMAGE COMPRESSION
        // ==========================================
        function compressImage(base64Str, callback) {
            const img = new Image();
            img.src = base64Str;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX = 600;
                let w = img.width, h = img.height;
                if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
                else       { if (h > MAX) { w = w * MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                callback(canvas.toDataURL('image/jpeg', 0.65));
            };
        }

        // Initialize App on load
        window.onload = () => initApp();

        // ==========================================
        // SAVE TOAST
        // ==========================================
        let _toastTimer = null;
        function showSaveToast() {
            const toast = document.getElementById('save-toast');
            toast.style.opacity = '1';
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

    </script>
</body>
</html>
