<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Scavenger Hunt</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the checkmark icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Prevent text selection on iPads to make it feel like a native app */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background-color: #f3f4f6;
        }
        
        /* Smooth transitions for interactions */
        .card-btn {
            transition: transform 0.1s ease-in-out, box-shadow 0.1s ease-in-out;
        }
        .card-btn:active {
            transform: scale(0.96);
        }

        /* Image object fit */
        .photo-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="min-h-screen pb-10 font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-6 shadow-md text-center rounded-b-3xl mb-6">
        <h1 class="text-3xl font-bold mb-2">Scavenger Hunt</h1>
        <p class="text-blue-100">Find the items below and take a picture!</p>
    </header>

    <!-- Main Grid Container -->
    <main class="max-w-5xl mx-auto px-4">
        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <!-- Cards will be injected here by JavaScript -->
        </div>

        <div class="mt-12 text-center">
            <button onclick="resetProgress()" class="text-gray-400 text-sm underline hover:text-red-500">
                Reset Progress (Start Over)
            </button>
        </div>
    </main>

    <!-- Hidden Camera Input -->
    <!-- 'capture="environment"' tells mobile devices to use the rear-facing camera -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col">
            
            <div class="p-4 text-center border-b">
                <h2 class="text-xl font-bold">Review Photo</h2>
            </div>
            
            <div class="bg-gray-100 p-4 flex justify-center items-center h-80">
                <img id="preview-image" src="" alt="Preview" class="max-h-full max-w-full rounded shadow-sm object-contain">
            </div>
            
            <div class="p-4 flex gap-4">
                <button id="btn-try-again" class="flex-1 py-3 px-4 bg-gray-200 text-gray-800 font-bold rounded-xl active:bg-gray-300">
                    <i class="fa-solid fa-rotate-left mr-2"></i> Try Again
                </button>
                <button id="btn-keep" class="flex-1 py-3 px-4 bg-green-500 text-white font-bold rounded-xl active:bg-green-600 shadow-lg shadow-green-500/30">
                    <i class="fa-solid fa-check mr-2"></i> Keep
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: Edit your worksheet items here
        // ==========================================
        const initialItems = [
            { id: 'item_1', title: 'Ant', icon: '🐜' },
            { id: 'item_2', title: 'Pillbug', icon: '🪲' },
            { id: 'item_3', title: 'Spider', icon: '🕷️' },
            { id: 'item_4', title: 'Lizard', icon: '🦎' },
            { id: 'item_5', title: 'Bird', icon: '🐦' },
            { id: 'item_6', title: 'Flower', icon: '🌼' },
            { id: 'item_7', title: 'Tree', icon: '🌳' },
            { id: 'item_8', title: 'Grass', icon: '🌱' },
            { id: 'item_9', title: 'Butterfly', icon: '🦋' },
            { id: 'item_10', title: 'Squirrel nest', icon: '🍂' },
            { id: 'item_11', title: 'Wasp nest', icon: '🐝' },
            { id: 'item_12', title: 'Mud dauber nest', icon: '🤎' },
            { id: 'item_13', title: 'Squirrel', icon: '🐿️' },
            { id: 'item_14', title: 'Pine cone', icon: '🌲' },
            { id: 'item_15', title: 'Larva (draw it!)', icon: '🐛' },
            { id: 'item_16', title: 'Earthworm', icon: '🪱' },
            { id: 'item_17', title: 'Ant mound', icon: '⛰️' },
            { id: 'item_18', title: 'Bird nest', icon: '🪺' },
            { id: 'item_19', title: 'Leaf', icon: '🍃' },
            { id: 'item_20', title: 'Cricket', icon: '🦗' },
            { id: 'item_21', title: 'Grasshopper', icon: '🦗' },
            { id: 'item_22', title: 'Water source', icon: '💧' },
            { id: 'item_23', title: 'Scat', icon: '💩' },
            { id: 'item_24', title: 'Beetle', icon: '🐞' }
            // Note: If you want to use image files later instead of emojis, 
            // you can change icon to: iconUrl: 'path/to/your/image.png'
        ];

        // ==========================================
        // APP STATE
        // ==========================================
        let itemsData = [];
        let activeItemId = null;
        let pendingImageDataUrl = null;

        // DOM Elements
        const gridContainer = document.getElementById('grid-container');
        const cameraInput = document.getElementById('camera-input');
        const previewModal = document.getElementById('preview-modal');
        const previewImage = document.getElementById('preview-image');
        const btnTryAgain = document.getElementById('btn-try-again');
        const btnKeep = document.getElementById('btn-keep');

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function initApp() {
            // Load saved progress from local storage if it exists
            let savedData = null;
            try {
                savedData = localStorage.getItem('scavengerHuntProgress');
            } catch (e) {
                console.warn("Local storage is disabled or blocked. Progress won't be saved across refreshes.");
            }

            if (savedData) {
                try {
                    itemsData = JSON.parse(savedData);
                    // Handle case where we might have changed the config items but old save exists
                    if(itemsData.length !== initialItems.length) {
                        itemsData = initializeFromConfig();
                    }
                } catch (e) {
                    itemsData = initializeFromConfig();
                }
            } else {
                itemsData = initializeFromConfig();
            }

            renderGrid();
        }

        function initializeFromConfig() {
            return initialItems.map(item => ({
                ...item,
                photoBase64: null // Holds the user's taken photo
            }));
        }

        function saveProgress() {
            // Save to local storage so iPad refreshing doesn't lose photos
            try {
                localStorage.setItem('scavengerHuntProgress', JSON.stringify(itemsData));
            } catch (e) {
                console.warn("Could not save to local storage.");
            }
        }

        function resetProgress() {
            if(confirm("Are you sure you want to delete all your photos and start over?")) {
                try {
                    localStorage.removeItem('scavengerHuntProgress');
                } catch(e) {
                    // Ignore errors if storage is blocked
                }
                itemsData = initializeFromConfig();
                renderGrid();
            }
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function renderGrid() {
            gridContainer.innerHTML = ''; // Clear current

            itemsData.forEach(item => {
                // Create card container
                const card = document.createElement('button');
                card.className = 'card-btn relative bg-white rounded-xl p-3 shadow-sm border-2 border-transparent flex flex-col items-center justify-center gap-3 aspect-square text-center focus:outline-none w-full';
                
                // Add click handler to prompt camera
                card.onclick = () => startCapture(item.id);

                // Determine what visual to show (Photo, Emoji, or Icon URL)
                let visualHtml = '';
                if (item.photoBase64) {
                    // Show taken photo
                    card.classList.add('border-green-400');
                    card.classList.replace('p-3', 'p-1'); // Less padding so image fills more
                    visualHtml = `<img src="${item.photoBase64}" class="photo-thumbnail" alt="Your photo of ${item.title}">`;
                    
                    // Add the Green Checkmark Badge overlay
                    visualHtml += `
                        <div class="absolute -top-3 -right-3 bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md border-2 border-white z-10">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    `;
                } else {
                    // Show placeholder
                    if (item.iconUrl) {
                        visualHtml = `<img src="${item.iconUrl}" class="w-16 h-16 object-contain" alt="${item.title} icon">`;
                    } else {
                        visualHtml = `<span class="text-5xl block drop-shadow-sm">${item.icon}</span>`;
                    }
                }

                // Compile Card HTML
                card.innerHTML = `
                    <div class="flex-1 w-full flex items-center justify-center relative rounded-lg bg-gray-50 overflow-hidden">
                        ${visualHtml}
                    </div>
                    <div class="font-bold text-sm leading-tight px-1 h-10 flex items-center justify-center text-gray-700">
                        ${item.title}
                    </div>
                `;

                gridContainer.appendChild(card);
            });
        }

        // ==========================================
        // CAMERA AND IMAGE LOGIC
        // ==========================================
        function startCapture(itemId) {
            activeItemId = itemId;
            // Clear any previous file selection to ensure 'change' event fires even if they select the same file
            cameraInput.value = ''; 
            cameraInput.click();
        }

        // Listen for when the user takes a photo or selects from library
        cameraInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show a loading state if processing takes a moment
            document.body.style.cursor = 'wait';

            const reader = new FileReader();
            reader.onload = function(event) {
                compressImage(event.target.result, function(compressedDataUrl) {
                    pendingImageDataUrl = compressedDataUrl;
                    showModal(compressedDataUrl);
                    document.body.style.cursor = 'default';
                });
            };
            reader.readAsDataURL(file);
        });

        // Crucial function for iPads: Scale down the image so we don't exceed LocalStorage quotas (5MB)
        function compressImage(base64Str, callback) {
            const img = new Image();
            img.src = base64Str;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                // Maximum dimensions for the saved image
                const MAX_WIDTH = 800;
                const MAX_HEIGHT = 800;
                let width = img.width;
                let height = img.height;

                // Calculate aspect ratio
                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Export as JPEG with 70% quality (great for web, small size)
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
        }

        // ==========================================
        // MODAL LOGIC (Keep or Try Again)
        // ==========================================
        function showModal(imageUrl) {
            previewImage.src = imageUrl;
            previewModal.classList.remove('hidden');
        }

        function hideModal() {
            previewModal.classList.add('hidden');
            previewImage.src = '';
            pendingImageDataUrl = null;
        }

        btnKeep.addEventListener('click', () => {
            if (activeItemId && pendingImageDataUrl) {
                // Find item and update its photo
                const itemIndex = itemsData.findIndex(i => i.id === activeItemId);
                if (itemIndex > -1) {
                    itemsData[itemIndex].photoBase64 = pendingImageDataUrl;
                    saveProgress();
                    renderGrid();
                }
            }
            hideModal();
        });

        btnTryAgain.addEventListener('click', () => {
            hideModal();
            // Re-trigger the camera for the same item immediately
            if (activeItemId) {
                startCapture(activeItemId);
            }
        });

        // Initialize App on load
        window.onload = initApp;

    </script>
</body>
</html>
